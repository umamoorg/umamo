# Continuous integration: lint + build + test every push/PR on JDK 21.
name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Least-privilege default: checkout is all this workflow needs. GitHub reports each
# job's pass/fail as a PR status check natively, no extra `checks`/`statuses` scope required.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Skip draft PRs to avoid burning runner minutes on WIP; ready_for_review re-triggers it.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: "21"

      # Provides ANDROID_HOME + sdkmanager; needed for the :android app + android targets.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v6

      - name: Build, test, and lint
        run: ./gradlew build --stacktrace
